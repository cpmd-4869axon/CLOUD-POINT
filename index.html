<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sentry Constructor v7.0</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <style>
        body { margin: 0; background: #000; color: #0f0; font-family: 'Courier New', monospace; overflow: hidden; touch-action: none; }
        #ui { position: absolute; top: 10px; left: 10px; z-index: 100; background: rgba(0,20,0,0.9); padding: 12px; border: 1px solid #0f0; width: 220px; }
        #pip { position: absolute; top: 10px; right: 10px; width: 100px; height: 100px; border: 1px solid #0f0; border-radius: 4px; overflow: hidden; }
        #v { width: 100%; height: 100%; object-fit: cover; }
        .btn-group { display: flex; flex-direction: column; gap: 6px; margin-top: 10px; }
        button { padding: 10px; background: #0f0; color: #000; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 10px; }
        .active { background: #f00 !important; color: #fff; box-shadow: 0 0 10px #f00; }
        #stats { font-size: 9px; color: #0ff; margin-top: 10px; }
    </style>
</head>
<body>

<div id="ui">
    <div style="font-weight: bold;">SENTRY CONSTRUCTOR v7.0</div>
    <div id="status" style="font-size: 10px;">SYSTEM: STANDBY</div>
    <div class="btn-group">
        <button id="btnInit">1. BOOT ENGINE</button>
        <button id="btnToggle" disabled>2. START RECONSTRUCTION</button>
        <button id="btnClear">3. RESET WORLD</button>
        <button id="btnSave" disabled>4. EXPORT MESH</button>
    </div>
    <div id="stats">VOXELS: 0</div>
</div>

<div id="pip"><video id="v" autoplay playsinline muted></video></div>

<script>
    let scene, camera, renderer, controls, selfieSegmentation;
    let isScanning = false;
    let voxelMap = new Map(); // Store permanent 3D points
    let instancedMesh;
    const MAX_VOXELS = 60000;
    const RES = 42; 
    const VOXEL_SIZE = 0.25;

    const v = document.getElementById('v');
    const stats = document.getElementById('stats');

    async function init() {
        document.getElementById('btnInit').innerText = "CALIBRATING...";
        try {
            selfieSegmentation = new SelfieSegmentation({
                locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation/${file}`
            });
            selfieSegmentation.setOptions({ modelSelection: 1 });
            selfieSegmentation.onResults(onResults);

            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { width: 128, height: 128, facingMode: "environment" } 
            });
            v.srcObject = stream;
            
            setup3D();
            
            document.getElementById('status').innerText = "SYSTEM: READY";
            document.getElementById('btnToggle').disabled = false;
            document.getElementById('btnInit').style.display = "none";
            
            processFrame();
        } catch (e) { console.error(e); }
    }

    function setup3D() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        camera.position.set(10, 10, 20);

        renderer = new THREE.WebGLRenderer({ antialias: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        scene.add(new THREE.GridHelper(40, 40, 0x004400, 0x001100));

        // Use InstancedMesh for performance (Drawing 60k cubes easily)
        const geometry = new THREE.BoxGeometry(VOXEL_SIZE, VOXEL_SIZE, VOXEL_SIZE);
        const material = new THREE.MeshBasicMaterial({ color: 0x00ff00 });
        instancedMesh = new THREE.InstancedMesh(geometry, material, MAX_VOXELS);
        instancedMesh.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
        scene.add(instancedMesh);

        loop();
    }

    async function processFrame() {
        if (isScanning && v.readyState === 4) {
            await selfieSegmentation.send({image: v});
        }
        requestAnimationFrame(processFrame);
    }

    function onResults(results) {
        if (!results.segmentationMask || !isScanning) return;
        
        const mask = results.segmentationMask;
        const canvas = document.createElement('canvas');
        canvas.width = RES; canvas.height = RES;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(mask, 0, 0, RES, RES);
        const data = ctx.getImageData(0, 0, RES, RES).data;
        
        const dummy = new THREE.Object3D();
        const spread = 0.4;

        for (let i = 0; i < RES * RES; i += 2) {
            const depth = data[i * 4] / 255;
            if (depth < 0.2) continue; 

            // Calculate Local Position
            const lx = ((i % RES) - RES/2) * spread;
            const ly = (RES/2 - Math.floor(i / RES)) * spread;
            const lz = depth * -18;

            // Project into World Space (The Building Effect)
            const worldPos = new THREE.Vector3(lx, ly, lz);
            worldPos.applyQuaternion(camera.quaternion);
            worldPos.add(camera.position);

            // Quantize to Grid (Snap to 0.25 units)
            const gx = Math.round(worldPos.x / VOXEL_SIZE) * VOXEL_SIZE;
            const gy = Math.round(worldPos.y / VOXEL_SIZE) * VOXEL_SIZE;
            const gz = Math.round(worldPos.z / VOXEL_SIZE) * VOXEL_SIZE;
            const key = `${gx},${gy},${gz}`;

            if (!voxelMap.has(key) && voxelMap.size < MAX_VOXELS) {
                voxelMap.set(key, {x: gx, y: gy, z: gz});
                
                // Update Instanced Mesh
                const idx = voxelMap.size - 1;
                dummy.position.set(gx, gy, gz);
                dummy.updateMatrix();
                instancedMesh.setMatrixAt(idx, dummy.matrix);
            }
        }
        instancedMesh.instanceMatrix.needsUpdate = true;
        stats.innerText = `VOXELS: ${voxelMap.size} / ${MAX_VOXELS}`;
        document.getElementById('btnSave').disabled = false;
    }

    function loop() {
        controls.update();
        renderer.render(scene, camera);
        requestAnimationFrame(loop);
    }

    document.getElementById('btnToggle').onclick = function() {
        isScanning = !isScanning;
        this.innerText = isScanning ? "PAUSE BUILDING" : "RESUME BUILDING";
        this.className = isScanning ? "active" : "";
        document.getElementById('status').innerText = isScanning ? "SYSTEM: CONSTRUCTING" : "SYSTEM: PAUSED";
    };

    document.getElementById('btnClear').onclick = () => {
        voxelMap.clear();
        instancedMesh.instanceMatrix.needsUpdate = true;
        stats.innerText = "VOXELS: 0";
    };

    document.getElementById('btnSave').onclick = () => {
        let out = "# SENTRY MESH EXPORT\n";
        voxelMap.forEach(v => {
            out += `${v.x.toFixed(3)} ${v.y.toFixed(3)} ${v.z.toFixed(3)}\n`;
        });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(new Blob([out], {type: 'text/plain'}));
        a.download = `constructed_world.xyz`;
        a.click();
    };

    document.getElementById('btnInit').onclick = init;
</script>
</body>
</html>
