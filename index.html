<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sentry Depth Mapper v4.0</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <style>
        body { margin: 0; background: #000; color: #0f0; font-family: 'Courier New', monospace; overflow: hidden; touch-action: none; }
        #ui { position: absolute; top: 10px; left: 10px; z-index: 100; background: rgba(0,0,0,0.9); padding: 15px; border: 1px solid #0f0; width: 260px; }
        .btn-group { display: flex; flex-direction: column; gap: 8px; margin-top: 10px; }
        button { padding: 12px; background: #0f0; color: #000; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        button:disabled { background: #030; color: #060; cursor: not-allowed; }
        #log { color: #f44; font-size: 10px; margin-top: 10px; word-wrap: break-word; }
        #gps { font-size: 11px; color: #888; margin-top: 5px; }
        canvas { display: block; }
    </style>
</head>
<body>

<div id="ui">
    <div style="font-weight: bold; letter-spacing: 2px;">SENTRY DEPTH ENGINE</div>
    <div id="status" style="font-size: 12px; margin-top: 5px;">STATUS: OFFLINE</div>
    <div id="gps">GPS: PENDING...</div>
    
    <div class="btn-group">
        <button id="btnInit">1. BOOT ENGINE</button>
        <button id="btnToggle" disabled>2. START SCAN</button>
        <button id="btnSave" disabled>3. EXPORT .XYZ</button>
    </div>
    <div id="log"></div>
</div>

<video id="v" autoplay playsinline muted style="display:none"></video>

<script>
    let scene, camera, renderer, points, controls, selfieSegmentation;
    let isScanning = false;
    let lastDepthData = null;
    let coords = "0.0, 0.0";
    const RES = 128; // Resolution for mobile performance

    const v = document.getElementById('v');
    const log = document.getElementById('log');

    async function init() {
        const bootBtn = document.getElementById('btnInit');
        bootBtn.innerText = "LOADING CORE...";
        bootBtn.disabled = true;
        
        try {
            // 1. Initialize MediaPipe Selfie Segmentation
            selfieSegmentation = new SelfieSegmentation({
                locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation/${file}`
            });

            selfieSegmentation.setOptions({ modelSelection: 1 }); // 1 = Landscape/General depth
            selfieSegmentation.onResults(onResults);

            // 2. Setup Camera
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { width: {ideal: RES}, height: {ideal: RES}, facingMode: "environment" } 
            });
            v.srcObject = stream;
            await v.play();

            setup3D();
            startGPS();

            document.getElementById('status').innerText = "STATUS: ONLINE";
            document.getElementById('btnToggle').disabled = false;
            bootBtn.innerText = "ENGINE READY";
            
            // Start the processing loop
            processFrame();
        } catch (e) {
            bootBtn.disabled = false;
            bootBtn.innerText = "RETRY BOOT";
            log.innerText = "CRITICAL: " + e.message;
        }
    }

    function setup3D() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 20);

        renderer = new THREE.WebGLRenderer({ antialias: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        const geo = new THREE.BufferGeometry();
        const positions = new Float32Array(RES * RES * 3);
        geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        
        // Green point cloud material
        const mat = new THREE.PointsMaterial({ size: 0.12, color: 0x00ff00 });
        points = new THREE.Points(geo, mat);
        scene.add(points);

        loop();
    }

    async function processFrame() {
        if (isScanning && v.readyState === 4) {
            await selfieSegmentation.send({image: v});
        }
        // Run as fast as the device allows
        requestAnimationFrame(processFrame);
    }

    function onResults(results) {
        if (!results.segmentationMask) return;
        
        const mask = results.segmentationMask;
        const attr = points.geometry.attributes.position.array;
        const scale = 0.15;
        
        // We capture the mask as our 'depth' proxy
        // In SelfieSegmentation, this is a 1-channel image
        const canvas = document.createElement('canvas');
        canvas.width = RES;
        canvas.height = RES;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(mask, 0, 0, RES, RES);
        const data = ctx.getImageData(0, 0, RES, RES).data;
        
        lastDepthData = new Float32Array(RES * RES);
        let i = 0;
        let p = 0;

        for (let y = 0; y < RES; y++) {
            for (let x = 0; x < RES; x++) {
                const brightness = data[p] / 255; // Use Red channel for depth proxy
                lastDepthData[i/3] = brightness;

                attr[i++] = (x - RES/2) * scale;
                attr[i++] = (RES/2 - y) * scale;
                attr[i++] = brightness * -15; // Z-axis extrusion
                p += 4;
            }
        }
        points.geometry.attributes.position.needsUpdate = true;
        document.getElementById('btnSave').disabled = false;
    }

    function loop() {
        if(controls) controls.update();
        if(renderer) renderer.render(scene, camera);
        requestAnimationFrame(loop);
    }

    function startGPS() {
        if (navigator.geolocation) {
            navigator.geolocation.watchPosition(p => {
                coords = `${p.coords.latitude.toFixed(6)}, ${p.coords.longitude.toFixed(6)}`;
                document.getElementById('gps').innerText = `GPS: ${coords}`;
            }, null, {enableHighAccuracy: true});
        }
    }

    document.getElementById('btnToggle').onclick = () => {
        isScanning = !isScanning;
        const btn = document.getElementById('btnToggle');
        btn.innerText = isScanning ? "PAUSE SCAN" : "RESUME SCAN";
        btn.style.background = isScanning ? "#f00" : "#0f0";
    };

    document.getElementById('btnSave').onclick = () => {
        if (!lastDepthData) return;
        let out = `# SENTRY SCAN | GPS: ${coords}\n`;
        const scale = 0.15;
        let i = 0;
        for(let y=0; y<RES; y++) {
            for(let x=0; x<RES; x++) {
                const z = (lastDepthData[i] * -15).toFixed(3);
                out += `${((x-RES/2)*scale).toFixed(3)} ${((RES/2-y)*scale).toFixed(3)} ${z}\n`;
                i++;
            }
        }
        const a = document.createElement('a');
        a.href = URL.createObjectURL(new Blob([out], {type: 'text/plain'}));
        a.download = `sentry_${Date.now()}.xyz`;
        a.click();
    };

    document.getElementById('btnInit').onclick = init;
    
    window.addEventListener('resize', () => {
        if(!camera) return;
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
