<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sentry Constructor v9.1</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-core@4.17.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-webgl@4.17.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/depth-estimation@0.0.4"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <style>
        body { margin: 0; background: #000; color: #0f0; font-family: 'Courier New', monospace; overflow: hidden; }
        #ui { position: absolute; top: 10px; left: 10px; z-index: 100; background: rgba(0,15,0,0.9); padding: 12px; border: 1px solid #0f0; width: 240px; }
        #pip { position: absolute; top: 10px; right: 10px; width: 120px; height: 90px; border: 1px solid #0f0; background: #111; z-index: 101; }
        #v { width: 100%; height: 100%; object-fit: cover; }
        .btn-group { display: flex; flex-direction: column; gap: 6px; margin-top: 10px; }
        button { padding: 12px; background: #0f0; color: #000; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 11px; }
        button:disabled { background: #030; color: #060; cursor: wait; }
        #status { font-size: 10px; color: #0ff; margin-bottom: 5px; }
        .terminal-text { font-size: 9px; color: #aaa; margin-top: 10px; height: 40px; overflow: hidden; }
    </style>
</head>
<body>

<div id="ui">
    <div style="font-weight: bold; border-bottom: 1px solid #0f0; padding-bottom: 5px; margin-bottom: 10px;">SENTRY LIDAR v9.1</div>
    <div id="status">STATUS: STANDBY</div>
    
    <div class="btn-group">
        <button id="btnInit">BOOT AI CORE</button>
        <button id="btnToggle" disabled>START SCAN</button>
        <button id="btnClear">RESET MESH</button>
    </div>
    
    <div id="stats" style="font-size: 10px; margin-top: 10px;">VOXELS: 0</div>
    <div id="terminal" class="terminal-text">Ready for initialization...</div>
</div>

<div id="pip"><video id="v" autoplay playsinline muted></video></div>

<script>
    let scene, camera, renderer, estimator, stream;
    let isScanning = false;
    let voxelMap = new Map();
    let instancedMesh;
    const MAX_VOXELS = 60000;
    const VOXEL_SIZE = 0.2;

    const v = document.getElementById('v');
    const term = document.getElementById('terminal');

    function log(msg) {
        term.innerHTML = `> ${msg}<br>${term.innerHTML}`;
        console.log(msg);
    }

    async function init() {
        const btn = document.getElementById('btnInit');
        btn.disabled = true;
        btn.innerText = "POWERING...";
        
        try {
            log("Initializing TensorFlow...");
            await tf.ready();
            log("WebGL Backend: " + tf.getBackend());
            
            log("Loading Depth Model...");
            const model = depthEstimation.SupportedModels.ARPortraitDepth;
            estimator = await depthEstimation.createEstimator(model);
            log("Model Loaded Successfully.");

            log("Requesting Camera...");
            stream = await navigator.mediaDevices.getUserMedia({ 
                video: { width: {ideal: 256}, height: {ideal: 256}, facingMode: "environment" } 
            });
            v.srcObject = stream;
            
            await v.play();
            log("Camera stream active.");

            setup3D();
            
            document.getElementById('status').innerText = "STATUS: ONLINE";
            document.getElementById('btnToggle').disabled = false;
            btn.style.display = "none";
            
            runLoop();
        } catch (e) {
            log("BOOT ERROR: " + e.message);
            btn.disabled = false;
            btn.innerText = "RETRY BOOT";
        }
    }

    function setup3D() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        camera.position.set(5, 5, 10);

        renderer = new THREE.WebGLRenderer({ antialias: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        new THREE.OrbitControls(camera, renderer.domElement);
        
        const geometry = new THREE.BoxGeometry(VOXEL_SIZE, VOXEL_SIZE, VOXEL_SIZE);
        const material = new THREE.MeshPhongMaterial({ color: 0x00ff00 });
        instancedMesh = new THREE.InstancedMesh(geometry, material, MAX_VOXELS);
        scene.add(instancedMesh);
        
        scene.add(new THREE.AmbientLight(0x404040));
        const light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(1, 1, 1);
        scene.add(light);
        log("3D Scene initialized.");
    }

    async function runLoop() {
        if (isScanning && v.readyState === 4) {
            try {
                const depthMap = await estimator.estimateDepth(v);
                const depthValues = await depthMap.toArray();
                
                const dummy = new THREE.Object3D();
                const rows = depthValues.length;
                const cols = depthValues[0].length;
                const skip = 5; // Higher skip = faster performance

                for (let y = 0; y < rows; y += skip) {
                    for (let x = 0; x < cols; x += skip) {
                        const depth = depthValues[y][x];
                        if (depth < 0.2) continue; 

                        const worldPos = new THREE.Vector3((x/cols-0.5)*15, (0.5-y/rows)*15, depth*-12);
                        worldPos.applyQuaternion(camera.quaternion);
                        worldPos.add(camera.position);

                        const gx = Math.round(worldPos.x/VOXEL_SIZE)*VOXEL_SIZE;
                        const gy = Math.round(worldPos.y/VOXEL_SIZE)*VOXEL_SIZE;
                        const gz = Math.round(worldPos.z/VOXEL_SIZE)*VOXEL_SIZE;
                        const key = `${gx},${gy},${gz}`;

                        if (!voxelMap.has(key) && voxelMap.size < MAX_VOXELS) {
                            voxelMap.set(key, true);
                            dummy.position.set(gx, gy, gz);
                            dummy.updateMatrix();
                            instancedMesh.setMatrixAt(voxelMap.size - 1, dummy.matrix);
                        }
                    }
                }
                instancedMesh.instanceMatrix.needsUpdate = true;
                document.getElementById('stats').innerText = `VOXELS: ${voxelMap.size}`;
                depthMap.dispose(); 
            } catch (err) {
                console.warn("Frame processing skipped.");
            }
        }
        
        renderer.render(scene, camera);
        requestAnimationFrame(runLoop);
    }

    document.getElementById('btnToggle').onclick = function() {
        isScanning = !isScanning;
        this.innerText = isScanning ? "PAUSE SCAN" : "RESUME SCAN";
        document.getElementById('status').innerText = isScanning ? "STATUS: SCANNING" : "STATUS: PAUSED";
    };

    document.getElementById('btnClear').onclick = () => {
        voxelMap.clear();
        instancedMesh.instanceMatrix.needsUpdate = true;
        document.getElementById('stats').innerText = "VOXELS: 0";
        log("Mesh cleared.");
    };

    document.getElementById('btnInit').onclick = init;
</script>
</body>
</html>
