<!DOCTYPE html>
<html>
<head>
    <title>Sentry Cloud Mapper</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.15.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/depth-estimation@0.0.4"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; background: #000; color: #0f0; font-family: 'Courier New', monospace; overflow: hidden; }
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; background: rgba(0,0,0,0.9); }
        #ui-trace { position: absolute; bottom: 20px; left: 20px; font-size: 12px; pointer-events: none; }
        button { padding: 20px 40px; background: #0f0; color: #000; border: none; font-weight: bold; cursor: pointer; border-radius: 4px; }
    </style>
</head>
<body>

<div id="overlay">
    <h2 id="msg">INITIALIZING SYSTEM...</h2>
    <button id="gatekeeper" style="display:none;">INITIALIZE CAMERA & SENSORS</button>
</div>

<div id="ui-trace">
    <div id="stat-gpu">GPU: PENDING</div>
    <div id="stat-gps">GPS: PENDING</div>
</div>

<video id="v" autoplay playsinline muted style="display:none"></video>

<script>
    let scene, camera, renderer, points, estimator;
    const v = document.getElementById('v');
    const btn = document.getElementById('gatekeeper');
    const msg = document.getElementById('msg');

    async function setupTF() {
        try {
            await tf.setBackend('webgl');
            await tf.ready();
            document.getElementById('stat-gpu').innerText = "GPU: " + tf.getBackend().toUpperCase();
            
            estimator = await depthEstimation.createEstimator(depthEstimation.SupportedModels.ARPortraitDepth);
            msg.innerText = "HARDWARE READY";
            btn.style.display = "block";
        } catch (e) {
            msg.innerText = "ERROR: " + e.message;
        }
    }

    async function boot() {
        document.getElementById('overlay').style.display = "none";
        
        // 1. Start Camera
        const stream = await navigator.mediaDevices.getUserMedia({ 
            video: { width: 256, height: 256, facingMode: "environment" } 
        });
        v.srcObject = stream;
        await v.play();

        // 2. Start GPS
        navigator.geolocation.watchPosition(p => {
            document.getElementById('stat-gps').innerText = `GPS: ${p.coords.latitude.toFixed(4)}, ${p.coords.longitude.toFixed(4)}`;
        });

        // 3. Three.js Setup
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        camera.position.z = 8;
        renderer = new THREE.WebGLRenderer();
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const geo = new THREE.BufferGeometry();
        const pos = new Float32Array(256 * 256 * 3);
        geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
        points = new THREE.Points(geo, new THREE.PointsMaterial({ size: 0.05, color: 0x00ff00 }));
        scene.add(points);

        loop();
    }

    async function loop() {
        if (v.readyState === 4) {
            const depth = await estimator.estimateDepth(v);
            const data = await depth.toArray();
            const attr = points.geometry.attributes.position.array;
            
            let i = 0;
            for(let y=0; y<256; y++) {
                for(let x=0; x<256; x++) {
                    attr[i++] = (x - 128) * 0.05;
                    attr[i++] = (128 - y) * 0.05;
                    attr[i++] = data[y][x] * -10;
                }
            }
            points.geometry.attributes.position.needsUpdate = true;
        }
        renderer.render(scene, camera);
        requestAnimationFrame(loop);
    }

    btn.onclick = boot;
    window.onload = setupTF;
</script>
</body>
</html>
