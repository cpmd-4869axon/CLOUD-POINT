<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sentry LiDAR v6.0</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <style>
        body { margin: 0; background: #000; color: #0f0; font-family: 'Courier New', monospace; overflow: hidden; touch-action: none; }
        
        /* Main UI */
        #ui { position: absolute; top: 10px; left: 10px; z-index: 100; background: rgba(0,20,0,0.8); padding: 12px; border: 1px solid #0f0; width: 220px; pointer-events: auto; }
        
        /* Mini Camera Window */
        #pip { position: absolute; bottom: 20px; right: 20px; width: 120px; height: 120px; border: 2px solid #0f0; background: #000; z-index: 100; overflow: hidden; border-radius: 8px; box-shadow: 0 0 10px #0f0; }
        #v { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }

        .btn-group { display: flex; flex-direction: column; gap: 5px; margin-top: 10px; }
        button { padding: 10px; background: #0f0; color: #000; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 11px; }
        .scanning { background: #f00 !important; color: #fff; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.7; } }
        #log { color: #0ff; font-size: 9px; margin-top: 8px; line-height: 1.2; }
    </style>
</head>
<body>

<div id="ui">
    <div style="font-size: 14px; font-weight: bold; letter-spacing: 1px;">LiDAR SENTRY v6.0</div>
    <div id="status" style="font-size: 10px; margin-top: 4px;">STATUS: OFFLINE</div>
    
    <div class="btn-group">
        <button id="btnInit">INITIALIZE SENSORS</button>
        <button id="btnToggle" disabled>START SCAN</button>
        <button id="btnClear">CLEAR CLOUD</button>
        <button id="btnSave" disabled>EXPORT .XYZ</button>
    </div>
    <div id="log">Move device slowly to "paint" the 3D space.</div>
</div>

<div id="pip">
    <video id="v" autoplay playsinline muted></video>
</div>

<script>
    let scene, camera, renderer, controls, selfieSegmentation;
    let isScanning = false;
    let cloudPoints = [];
    let particleSystem;
    const MAX_POINTS = 50000; // Limit for mobile performance
    const RES = 48; // Capture resolution

    const v = document.getElementById('v');
    const log = document.getElementById('log');

    async function init() {
        document.getElementById('btnInit').innerText = "BOOTING...";
        try {
            selfieSegmentation = new SelfieSegmentation({
                locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation/${file}`
            });
            selfieSegmentation.setOptions({ modelSelection: 1 });
            selfieSegmentation.onResults(onResults);

            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { width: 128, height: 128, facingMode: "environment" } 
            });
            v.srcObject = stream;
            
            setup3D();
            
            document.getElementById('status').innerText = "STATUS: READY";
            document.getElementById('btnToggle').disabled = false;
            document.getElementById('btnInit').style.display = "none";
            
            processFrame();
        } catch (e) {
            log.innerText = "CRITICAL ERROR: " + e.message;
        }
    }

    function setup3D() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        camera.position.set(0, 5, 15);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        // LiDAR Floor Grid
        const grid = new THREE.GridHelper(50, 50, 0x004400, 0x001100);
        scene.add(grid);

        // Persistent Point Cloud Geometry
        const geo = new THREE.BufferGeometry();
        const positions = new Float32Array(MAX_POINTS * 3);
        const colors = new Float32Array(MAX_POINTS * 3);
        geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
        
        const mat = new THREE.PointsMaterial({ size: 0.08, vertexColors: true });
        particleSystem = new THREE.Points(geo, mat);
        scene.add(particleSystem);

        loop();
    }

    async function processFrame() {
        if (isScanning && v.readyState === 4) {
            await selfieSegmentation.send({image: v});
        }
        requestAnimationFrame(processFrame);
    }

    let pointIdx = 0;
    function onResults(results) {
        if (!results.segmentationMask || !isScanning) return;
        
        const mask = results.segmentationMask;
        const posAttr = particleSystem.geometry.attributes.position.array;
        const colAttr = particleSystem.geometry.attributes.color.array;
        
        const canvas = document.createElement('canvas');
        canvas.width = RES; canvas.height = RES;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(mask, 0, 0, RES, RES);
        const data = ctx.getImageData(0, 0, RES, RES).data;
        
        const spread = 0.25;

        for (let i = 0; i < RES * RES; i += 2) { // Downsample for performance
            const depth = data[i * 4] / 255;
            if (depth < 0.1) continue; 

            const x = (i % RES) - RES/2;
            const y = RES/2 - Math.floor(i / RES);

            // Calculate World Position (Immersive LiDAR feel)
            // We use the camera's current rotation to "place" points in space
            const vector = new THREE.Vector3(x * spread, y * spread, depth * -15);
            vector.applyQuaternion(camera.quaternion);
            vector.add(camera.position);

            const writeIdx = (pointIdx % MAX_POINTS) * 3;
            
            posAttr[writeIdx] = vector.x;
            posAttr[writeIdx + 1] = vector.y;
            posAttr[writeIdx + 2] = vector.z;

            // LiDAR Rainbow Gradient based on Y (Height)
            colAttr[writeIdx] = depth;          // R
            colAttr[writeIdx + 1] = 1 - depth;  // G
            colAttr[writeIdx + 2] = 0.5;        // B

            pointIdx++;
        }
        particleSystem.geometry.attributes.position.needsUpdate = true;
        particleSystem.geometry.attributes.color.needsUpdate = true;
        document.getElementById('btnSave').disabled = false;
    }

    function loop() {
        controls.update();
        renderer.render(scene, camera);
        requestAnimationFrame(loop);
    }

    document.getElementById('btnToggle').onclick = function() {
        isScanning = !isScanning;
        this.innerText = isScanning ? "PAUSE RECONSTRUCTION" : "RESUME SCAN";
        this.className = isScanning ? "scanning" : "";
        document.getElementById('status').innerText = isScanning ? "STATUS: ACTIVE MAPPING" : "STATUS: FROZEN";
    };

    document.getElementById('btnClear').onclick = () => {
        const posAttr = particleSystem.geometry.attributes.position.array;
        posAttr.fill(0);
        particleSystem.geometry.attributes.position.needsUpdate = true;
        pointIdx = 0;
    };

    document.getElementById('btnSave').onclick = () => {
        let out = "# SENTRY LIDAR CLOUD\n";
        const pos = particleSystem.geometry.attributes.position.array;
        for(let i=0; i < Math.min(pointIdx, MAX_POINTS); i++) {
            out += `${pos[i*3].toFixed(3)} ${pos[i*3+1].toFixed(3)} ${pos[i*3+2].toFixed(3)}\n`;
        }
        const a = document.createElement('a');
        a.href = URL.createObjectURL(new Blob([out], {type: 'text/plain'}));
        a.download = `lidar_map.xyz`;
        a.click();
    };

    document.getElementById('btnInit').onclick = init;
</script>
</body>
</html>
