<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sentry Depth Mapper v5.0</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <style>
        body { margin: 0; background: #020502; color: #0f0; font-family: 'Courier New', monospace; overflow: hidden; touch-action: none; }
        #ui { position: absolute; top: 15px; left: 15px; z-index: 100; background: rgba(0,20,0,0.9); padding: 15px; border: 2px solid #0f0; width: 260px; box-shadow: 0 0 15px rgba(0,255,0,0.3); }
        .btn-group { display: flex; flex-direction: column; gap: 10px; margin-top: 10px; }
        button { padding: 12px; background: #0f0; color: #000; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; transition: all 0.3s; }
        #status { font-size: 12px; margin-bottom: 5px; text-shadow: 0 0 5px #0f0; }
        .scanning { background: #f00 !important; color: #fff; box-shadow: 0 0 20px #f00; }
        .paused { background: #0ff !important; color: #000; box-shadow: 0 0 20px #0ff; }
        #log { color: #0ff; font-size: 10px; margin-top: 10px; }
    </style>
</head>
<body>

<div id="ui">
    <div>SENTRY DEPTH v5.0 [VOLUMETRIC]</div>
    <div id="status">STATUS: OFFLINE</div>
    <div id="gps" style="font-size:10px; color:#0a0;">GPS: PENDING...</div>
    <div class="btn-group">
        <button id="btnInit">BOOT SCANNER</button>
        <button id="btnToggle" disabled>START SCAN</button>
        <button id="btnSave" disabled>EXPORT .XYZ</button>
    </div>
    <div id="log"></div>
</div>

<video id="v" autoplay playsinline muted style="display:none"></video>

<script>
    let scene, camera, renderer, points, voxels, controls, selfieSegmentation;
    let isScanning = false;
    let lastDepthData = null;
    const RES = 64; // Lower resolution for high-quality 3D voxel rendering

    const v = document.getElementById('v');
    const log = document.getElementById('log');

    async function init() {
        document.getElementById('btnInit').innerText = "CALIBRATING...";
        try {
            selfieSegmentation = new SelfieSegmentation({
                locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation/${file}`
            });
            selfieSegmentation.setOptions({ modelSelection: 1 });
            selfieSegmentation.onResults(onResults);

            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { width: RES, height: RES, facingMode: "environment" } 
            });
            v.srcObject = stream;
            await v.play();

            setup3D();
            
            document.getElementById('status').innerText = "STATUS: ONLINE";
            document.getElementById('btnToggle').disabled = false;
            document.getElementById('btnInit').style.display = "none";
            
            processFrame();
        } catch (e) {
            log.innerText = "SENSOR ERROR: " + e.message;
        }
    }

    function setup3D() {
        scene = new THREE.Scene();
        scene.fog = new THREE.Fog(0x020502, 10, 50);

        camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
        camera.position.set(15, 15, 25);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        // Immersive Lighting
        const light = new THREE.PointLight(0x00ff00, 2, 50);
        light.position.set(0, 10, 10);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0x002200));

        // Reflector Floor
        const grid = new THREE.GridHelper(100, 50, 0x004400, 0x001100);
        grid.position.y = -10;
        scene.add(grid);

        // Point Cloud (Live Mode)
        const geo = new THREE.BufferGeometry();
        const pos = new Float32Array(RES * RES * 3);
        geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
        const mat = new THREE.PointsMaterial({ size: 0.15, color: 0x00ff00 });
        points = new THREE.Points(geo, mat);
        scene.add(points);

        // Voxel Group (Pause Mode)
        voxels = new THREE.Group();
        scene.add(voxels);

        loop();
    }

    async function processFrame() {
        if (isScanning && v.readyState === 4) {
            await selfieSegmentation.send({image: v});
        }
        requestAnimationFrame(processFrame);
    }

    function onResults(results) {
        if (!results.segmentationMask || !isScanning) return;
        
        const mask = results.segmentationMask;
        const posAttr = points.geometry.attributes.position.array;
        
        const canvas = document.createElement('canvas');
        canvas.width = RES; canvas.height = RES;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(mask, 0, 0, RES, RES);
        const data = ctx.getImageData(0, 0, RES, RES).data;
        
        lastDepthData = new Float32Array(RES * RES);
        const scale = 0.3;

        for (let i = 0; i < RES * RES; i++) {
            const depth = data[i * 4] / 255;
            lastDepthData[i] = depth;
            const x = i % RES;
            const y = Math.floor(i / RES);

            posAttr[i * 3] = (x - RES/2) * scale;
            posAttr[i * 3 + 1] = (RES/2 - y) * scale;
            posAttr[i * 3 + 2] = depth * -20;
        }
        points.geometry.attributes.position.needsUpdate = true;
        document.getElementById('btnSave').disabled = false;
    }

    function generateVoxels() {
        voxels.clear();
        if (!lastDepthData) return;

        // Material for 3D shapes
        const boxGeo = new THREE.BoxGeometry(0.25, 0.25, 0.25);
        const boxMat = new THREE.MeshPhongMaterial({ 
            color: 0x00ffff, 
            emissive: 0x004444,
            shininess: 100 
        });

        const scale = 0.3;
        // Optimization: Only render every 2nd point for 3D voxel performance
        for (let i = 0; i < lastDepthData.length; i += 2) {
            if (lastDepthData[i] < 0.1) continue; // Skip empty space

            const mesh = new THREE.Mesh(boxGeo, boxMat);
            const x = i % RES;
            const y = Math.floor(i / RES);

            mesh.position.set(
                (x - RES/2) * scale,
                (RES/2 - y) * scale,
                lastDepthData[i] * -20
            );
            voxels.add(mesh);
        }
    }

    function loop() {
        controls.update();
        renderer.render(scene, camera);
        requestAnimationFrame(loop);
    }

    document.getElementById('btnToggle').onclick = function() {
        isScanning = !isScanning;
        if (!isScanning) {
            // Enter PAUSE mode: Generate 3D Shapes
            generateVoxels();
            points.visible = false;
            voxels.visible = true;
            this.innerText = "RESUME LIVE SCAN";
            this.className = "paused";
            document.getElementById('status').innerText = "STATUS: VOLUMETRIC VIEW";
            log.innerText = "IMMERSIVE MODE: Shapes formed. Inspect 3D structure.";
        } else {
            // Enter LIVE mode: Show Points
            points.visible = true;
            voxels.visible = false;
            this.innerText = "FREEZE & FORM SHAPES";
            this.className = "scanning";
            document.getElementById('status').innerText = "STATUS: SCANNING...";
            log.innerText = "";
        }
    };

    document.getElementById('btnSave').onclick = () => {
        let out = "# SENTRY VOLUMETRIC EXPORT\n";
        for(let i=0; i<lastDepthData.length; i++) {
            const x = (i % RES); const y = Math.floor(i / RES);
            out += `${((x-RES/2)*0.3).toFixed(3)} ${((RES/2-y)*0.3).toFixed(3)} ${(lastDepthData[i]*-20).toFixed(3)}\n`;
        }
        const a = document.createElement('a');
        a.href = URL.createObjectURL(new Blob([out], {type: 'text/plain'}));
        a.download = `volumetric_scan.xyz`;
        a.click();
    };

    document.getElementById('btnInit').onclick = init;
</script>
</body>
</html>
