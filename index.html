<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sentry Brain v12.0</title>
    <script src="https://unpkg.com/brain.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        body { margin: 0; background: #000; color: #0f0; font-family: 'Courier New', monospace; overflow: hidden; }
        #ui { position: absolute; top: 15px; left: 15px; z-index: 100; background: rgba(0,10,0,0.85); padding: 20px; border: 1px solid #0f0; width: 240px; box-shadow: 0 0 15px rgba(0,255,0,0.2); }
        .btn { display: block; width: 100%; padding: 12px; margin-top: 10px; background: transparent; color: #0f0; border: 1px solid #0f0; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn:hover { background: #0f0; color: #000; }
        #stats { font-size: 10px; margin-top: 10px; color: #0a0; }
        #v { position: absolute; bottom: 15px; right: 15px; width: 160px; height: 120px; border: 1px solid #0f0; background: #111; object-fit: cover; opacity: 0.7; }
        .latent-tag { position: absolute; top: 15px; right: 15px; font-size: 12px; }
    </style>
</head>
<body>

<div id="ui">
    <div style="letter-spacing: 2px; border-bottom: 1px solid #0f0; padding-bottom: 5px;">SENTRY_OS_v12</div>
    <div id="stats">NODES: <span id="nodeCount">0</span> / 80k</div>
    <button id="btnInit" class="btn">BOOT CORE</button>
    <div id="controls" style="display:none">
        <button id="btnToggle" class="btn">START SCAN</button>
        <button id="btnClear" class="btn" style="border-color:#f00; color:#f00;">PURGE MEMORY</button>
    </div>
</div>

<video id="v" autoplay playsinline muted></video>
<canvas id="c_proc" style="display:none"></canvas>

<script>
    let scene, camera, renderer, brainNet, mesh, controls;
    let isScanning = false;
    let voxelMap = new Set();
    const MAX_PTS = 80000;
    const SIZE = 0.12; 
    const dummy = new THREE.Object3D();
    const color = new THREE.Color();

    // Initialize Neural Net with more diverse training for edge detection
    async function initAI() {
        brainNet = new brain.NeuralNetwork();
        brainNet.train([
            { input: { r: 0, g: 0, b: 0 }, output: { edge: 0 } },
            { input: { r: 1, g: 1, b: 1 }, output: { edge: 0 } },
            { input: { r: 0.5, g: 0.5, b: 0.1 }, output: { edge: 1 } }
        ]);
    }

    async function init() {
        const btnInit = document.getElementById('btnInit');
        btnInit.innerText = "CONNECTING SENSORS...";
        
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
            document.getElementById('v').srcObject = stream;
            
            await initAI();
            setup3D();
            
            btnInit.style.display = "none";
            document.getElementById('controls').style.display = "block";
            loop();
        } catch (e) {
            btnInit.innerText = "SENSOR ERROR";
            console.error(e);
        }
    }

    function setup3D() {
        scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x000000, 0.05);

        camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        camera.position.set(5, 5, 5);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);
        
        controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        // Using MeshLambert for slight depth shading
        const geometry = new THREE.BoxGeometry(SIZE, SIZE, SIZE);
        const material = new THREE.MeshBasicMaterial({ vertexColors: true });
        
        mesh = new THREE.InstancedMesh(geometry, material, MAX_PTS);
        
        // Hide instances initially
        const matrix = new THREE.Matrix4().makeScale(0, 0, 0);
        for(let i = 0; i < MAX_PTS; i++) mesh.setMatrixAt(i, matrix);
        
        scene.add(mesh);
    }

    function loop() {
        const video = document.getElementById('v');
        if (isScanning && video.readyState === 4) {
            processFrame(video);
        }
        
        controls.update();
        renderer.render(scene, camera);
        requestAnimationFrame(loop);
    }

    function processFrame(video) {
        const canvas = document.getElementById('c_proc');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const res = 40; // Resolution of scan
        canvas.width = res; canvas.height = res;
        ctx.drawImage(video, 0, 0, res, res);
        
        const imgData = ctx.getImageData(0, 0, res, res).data;
        let count = voxelMap.size;

        for (let i = 0; i < imgData.length; i += 16) { // Step for performance
            if (count >= MAX_PTS) break;

            const r = imgData[i] / 255;
            const g = imgData[i+1] / 255;
            const b = imgData[i+2] / 255;
            const lum = (r + g + b) / 3;

            // Simple delta check for "interesting" points
            if (lum < 0.2) continue; 

            // Project point relative to camera view
            const x = ((i/4) % res - res/2) * 0.4;
            const y = (res/2 - Math.floor((i/4) / res)) * 0.4;
            const z = (lum * -8); 

            const pos = new THREE.Vector3(x, y, z).applyQuaternion(camera.quaternion).add(camera.position);
            
            // Grid snapping (Voxelization)
            const gx = Math.round(pos.x / SIZE) * SIZE;
            const gy = Math.round(pos.y / SIZE) * SIZE;
            const gz = Math.round(pos.z / SIZE) * SIZE;
            const key = `${gx}|${gy}|${gz}`;

            if (!voxelMap.has(key)) {
                voxelMap.add(key);
                dummy.position.set(gx, gy, gz);
                dummy.updateMatrix();
                
                mesh.setMatrixAt(count, dummy.matrix);
                mesh.setColorAt(count, color.setRGB(r, g * 1.5, b)); // Boost green for 'Sentry' look
                count++;
            }
        }
        
        if (voxelMap.size !== count) {
            mesh.instanceMatrix.needsUpdate = true;
            if (mesh.instanceColor) mesh.instanceColor.needsUpdate = true;
            document.getElementById('nodeCount').innerText = voxelMap.size;
        }
    }

    // --- UI EVENTS ---
    document.getElementById('btnClear').onclick = () => {
        voxelMap.clear();
        const hide = new THREE.Matrix4().makeScale(0,0,0);
        for(let i=0; i<MAX_PTS; i++) mesh.setMatrixAt(i, hide);
        mesh.instanceMatrix.needsUpdate = true;
        document.getElementById('nodeCount').innerText = "0";
    };

    document.getElementById('btnToggle').onclick = function() {
        isScanning = !isScanning;
        this.innerText = isScanning ? "STOP SCAN" : "RESUME SCAN";
        this.style.background = isScanning ? "#0f0" : "transparent";
        this.style.color = isScanning ? "#000" : "#0f0";
    };

    document.getElementById('btnInit').onclick = init;

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
