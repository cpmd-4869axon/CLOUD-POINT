<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sentry Constructor v8.0</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-core"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-webgl"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/depth-estimation"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <style>
        body { margin: 0; background: #000; color: #0f0; font-family: 'Courier New', monospace; overflow: hidden; touch-action: none; }
        #ui { position: absolute; top: 10px; left: 10px; z-index: 100; background: rgba(0,20,0,0.9); padding: 12px; border: 1px solid #0f0; width: 220px; }
        #pip { position: absolute; top: 10px; right: 10px; width: 120px; height: 90px; border: 1px solid #0f0; background: #000; z-index: 101; }
        #v { width: 100%; height: 100%; object-fit: cover; }
        .btn-group { display: flex; flex-direction: column; gap: 6px; margin-top: 10px; }
        button { padding: 10px; background: #0f0; color: #000; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 10px; }
        .active { background: #f00 !important; color: #fff; box-shadow: 0 0 10px #f00; }
        #stats { font-size: 9px; color: #0ff; margin-top: 10px; }
    </style>
</head>
<body>

<div id="ui">
    <div style="font-weight: bold;">SENTRY LIDAR v8.0</div>
    <div id="status" style="font-size: 10px;">SYSTEM: LOADING TF.JS</div>
    <div class="btn-group">
        <button id="btnInit">1. BOOT ENGINE</button>
        <button id="btnToggle" disabled>2. START SCAN</button>
        <button id="btnClear">3. RESET WORLD</button>
    </div>
    <div id="stats">OBJECTS BUILT: 0</div>
</div>

<div id="pip"><video id="v" autoplay playsinline muted></video></div>

<script>
    let scene, camera, renderer, controls, estimator;
    let isScanning = false;
    let voxelMap = new Map();
    let instancedMesh;
    const MAX_VOXELS = 80000;
    const RES = 40; // Resolution for voxel grid
    const VOXEL_SIZE = 0.2;

    const v = document.getElementById('v');
    const stats = document.getElementById('stats');

    async function init() {
        document.getElementById('btnInit').innerText = "LOADING AI...";
        try {
            await tf.setBackend('webgl');
            // Using the Portrait Depth model for finer detail
            const model = depthEstimation.SupportedModels.ARPortraitDepth;
            estimator = await depthEstimation.createEstimator(model);

            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { width: 256, height: 256, facingMode: "environment" } 
            });
            v.srcObject = stream;
            
            setup3D();
            
            document.getElementById('status').innerText = "SYSTEM: READY";
            document.getElementById('btnToggle').disabled = false;
            document.getElementById('btnInit').style.display = "none";
            
            processFrame();
        } catch (e) { 
            document.getElementById('status').innerText = "ERROR: CHECK CAMERA";
            console.error(e); 
        }
    }

    function setup3D() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        camera.position.set(5, 5, 10);

        renderer = new THREE.WebGLRenderer({ antialias: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        scene.add(new THREE.GridHelper(50, 50, 0x004400, 0x001100));

        const geometry = new THREE.BoxGeometry(VOXEL_SIZE, VOXEL_SIZE, VOXEL_SIZE);
        const material = new THREE.MeshPhongMaterial({ color: 0x00ff00 });
        instancedMesh = new THREE.InstancedMesh(geometry, material, MAX_VOXELS);
        scene.add(instancedMesh);
        
        scene.add(new THREE.AmbientLight(0x404040));
        const light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(1, 1, 1);
        scene.add(light);

        loop();
    }

    async function processFrame() {
        if (isScanning && v.readyState === 4) {
            const depthMap = await estimator.estimateDepth(v);
            const depthValues = await depthMap.toArray(); // Get per-pixel depth
            updateWorld(depthValues);
        }
        requestAnimationFrame(processFrame);
    }

    function updateWorld(depthValues) {
        const dummy = new THREE.Object3D();
        const rows = depthValues.length;
        const cols = depthValues[0].length;
        const skip = Math.floor(rows / RES);

        for (let y = 0; y < rows; y += skip) {
            for (let x = 0; x < cols; x += skip) {
                const depth = depthValues[y][x]; // Normalized depth value
                if (depth < 0.1) continue; 

                // World Projection with Camera Orientation
                const worldPos = new THREE.Vector3(
                    (x / cols - 0.5) * 15,
                    (0.5 - y / rows) * 15,
                    depth * -12
                );
                worldPos.applyQuaternion(camera.quaternion);
                worldPos.add(camera.position);

                // Quantize to construct a solid mesh grid
                const gx = Math.round(worldPos.x / VOXEL_SIZE) * VOXEL_SIZE;
                const gy = Math.round(worldPos.y / VOXEL_SIZE) * VOXEL_SIZE;
                const gz = Math.round(worldPos.z / VOXEL_SIZE) * VOXEL_SIZE;
                const key = `${gx},${gy},${gz}`;

                if (!voxelMap.has(key) && voxelMap.size < MAX_VOXELS) {
                    voxelMap.set(key, true);
                    const idx = voxelMap.size - 1;
                    dummy.position.set(gx, gy, gz);
                    dummy.updateMatrix();
                    instancedMesh.setMatrixAt(idx, dummy.matrix);
                }
            }
        }
        instancedMesh.instanceMatrix.needsUpdate = true;
        stats.innerText = `OBJECTS BUILT: ${voxelMap.size}`;
    }

    function loop() {
        controls.update();
        renderer.render(scene, camera);
        requestAnimationFrame(loop);
    }

    document.getElementById('btnToggle').onclick = function() {
        isScanning = !isScanning;
        this.innerText = isScanning ? "STOP BUILDING" : "RESUME BUILDING";
        this.className = isScanning ? "active" : "";
    };

    document.getElementById('btnClear').onclick = () => {
        voxelMap.clear();
        instancedMesh.instanceMatrix.needsUpdate = true;
        stats.innerText = "OBJECTS BUILT: 0";
    };

    document.getElementById('btnInit').onclick = init;
</script>
</body>
</html>
