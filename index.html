<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sentry Depth Mapper v4.2</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <style>
        body { margin: 0; background: #000; color: #0f0; font-family: 'Courier New', monospace; overflow: hidden; touch-action: none; }
        #ui { position: absolute; top: 10px; left: 10px; z-index: 100; background: rgba(0,0,0,0.85); padding: 15px; border: 1px solid #0f0; width: 260px; pointer-events: auto; }
        .btn-group { display: flex; flex-direction: column; gap: 8px; margin-top: 10px; }
        button { padding: 12px; background: #0f0; color: #000; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        #status { font-size: 12px; margin-bottom: 5px; }
        #log { color: #f44; font-size: 10px; margin-top: 8px; font-style: italic; }
        .scanning { background: #f00 !important; color: #fff; }
        .paused { background: #00f !important; color: #fff; }
    </style>
</head>
<body>

<div id="ui">
    <div>SENTRY DEPTH ENGINE v4.2</div>
    <div id="status">STATUS: OFFLINE</div>
    <div id="gps" style="font-size:10px; color:#888;">GPS: PENDING...</div>
    <div class="btn-group">
        <button id="btnInit">BOOT ENGINE</button>
        <button id="btnToggle" disabled>START SCAN</button>
        <button id="btnSave" disabled>EXPORT .XYZ</button>
    </div>
    <div id="log"></div>
</div>

<video id="v" autoplay playsinline muted style="display:none"></video>

<script>
    let scene, camera, renderer, points, controls, selfieSegmentation;
    let isScanning = false;
    let lastDepthData = null;
    const RES = 128; 

    const v = document.getElementById('v');
    const log = document.getElementById('log');

    async function init() {
        document.getElementById('btnInit').innerText = "LOADING CORE...";
        try {
            selfieSegmentation = new SelfieSegmentation({
                locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation/${file}`
            });
            selfieSegmentation.setOptions({ modelSelection: 1 });
            selfieSegmentation.onResults(onResults);

            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { width: RES, height: RES, facingMode: "environment" } 
            });
            v.srcObject = stream;
            await v.play();

            setup3D();
            
            document.getElementById('status').innerText = "STATUS: ONLINE";
            document.getElementById('btnToggle').disabled = false;
            document.getElementById('btnInit').style.display = "none";
            
            processFrame();
        } catch (e) {
            log.innerText = "BOOT ERROR: " + e.message;
        }
    }

    function setup3D() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        camera.position.set(10, 10, 20);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        // Visual Helpers for 3D Space
        const grid = new THREE.GridHelper(40, 40, 0x004400, 0x002200);
        grid.rotation.x = Math.PI / 2; // Align with camera plane
        scene.add(grid);

        const axes = new THREE.AxesHelper(5);
        scene.add(axes);

        // Point Cloud Setup
        const geo = new THREE.BufferGeometry();
        const pos = new Float32Array(RES * RES * 3);
        const col = new Float32Array(RES * RES * 3);
        geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
        geo.setAttribute('color', new THREE.BufferAttribute(col, 3));
        
        const mat = new THREE.PointsMaterial({ size: 0.15, vertexColors: true });
        points = new THREE.Points(geo, mat);
        scene.add(points);

        loop();
    }

    async function processFrame() {
        if (isScanning && v.readyState === 4) {
            await selfieSegmentation.send({image: v});
        }
        requestAnimationFrame(processFrame);
    }

    function onResults(results) {
        if (!results.segmentationMask || !isScanning) return;
        
        const mask = results.segmentationMask;
        const posAttr = points.geometry.attributes.position.array;
        const colAttr = points.geometry.attributes.color.array;
        
        const canvas = document.createElement('canvas');
        canvas.width = RES; canvas.height = RES;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(mask, 0, 0, RES, RES);
        const data = ctx.getImageData(0, 0, RES, RES).data;
        
        lastDepthData = new Float32Array(RES * RES);
        const scale = 0.15;

        for (let i = 0; i < RES * RES; i++) {
            const depth = data[i * 4] / 255;
            lastDepthData[i] = depth;

            const x = i % RES;
            const y = Math.floor(i / RES);

            // Update Position
            posAttr[i * 3] = (x - RES/2) * scale;
            posAttr[i * 3 + 1] = (RES/2 - y) * scale;
            posAttr[i * 3 + 2] = depth * -15;

            // Color Mapping: Deep Blue (Far) to Bright Green (Close)
            colAttr[i * 3] = 0;             // R
            colAttr[i * 3 + 1] = depth;     // G
            colAttr[i * 3 + 2] = 1 - depth; // B
        }
        points.geometry.attributes.position.needsUpdate = true;
        points.geometry.attributes.color.needsUpdate = true;
        document.getElementById('btnSave').disabled = false;
    }

    function loop() {
        controls.update();
        renderer.render(scene, camera);
        requestAnimationFrame(loop);
    }

    document.getElementById('btnToggle').onclick = function() {
        isScanning = !isScanning;
        this.innerText = isScanning ? "FREEZE & INSPECT" : "RESUME LIVE SCAN";
        this.className = isScanning ? "scanning" : "paused";
        document.getElementById('status').innerText = isScanning ? "STATUS: LIVE" : "STATUS: FROZEN";
    };

    document.getElementById('btnSave').onclick = () => {
        let out = "# SENTRY EXPORT\n";
        for(let i=0; i<lastDepthData.length; i++) {
            const x = (i % RES); const y = Math.floor(i / RES);
            out += `${((x-RES/2)*0.15).toFixed(3)} ${((RES/2-y)*0.15).toFixed(3)} ${(lastDepthData[i]*-15).toFixed(3)}\n`;
        }
        const a = document.createElement('a');
        a.href = URL.createObjectURL(new Blob([out], {type: 'text/plain'}));
        a.download = `scan_${Date.now()}.xyz`;
        a.click();
    };

    document.getElementById('btnInit').onclick = init;
</script>
</body>
</html>
