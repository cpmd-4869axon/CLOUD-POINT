<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sentry Constructor v9.2</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-core@4.17.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-converter@4.17.0"></script> <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-webgl@4.17.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/depth-estimation@0.0.4"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <style>
        body { margin: 0; background: #000; color: #0f0; font-family: 'Courier New', monospace; overflow: hidden; }
        #ui { position: absolute; top: 10px; left: 10px; z-index: 100; background: rgba(0,20,0,0.95); padding: 15px; border: 1px solid #0f0; width: 250px; }
        #pip { position: absolute; top: 10px; right: 10px; width: 100px; height: 75px; border: 1px solid #0f0; background: #111; z-index: 101; }
        #v { width: 100%; height: 100%; object-fit: cover; }
        .btn { display: block; width: 100%; padding: 12px; margin-top: 8px; background: #0f0; color: #000; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 11px; }
        .btn:disabled { background: #030; color: #060; }
        .error { color: #f00; font-size: 10px; margin-top: 10px; border-top: 1px solid #f00; padding-top: 5px; }
        #log { font-size: 9px; color: #0ff; margin-top: 10px; height: 50px; overflow-y: auto; }
    </style>
</head>
<body>

<div id="ui">
    <div style="font-weight: bold; border-bottom: 1px solid #0f0; padding-bottom: 5px;">SENTRY LIDAR v9.2</div>
    <div id="log">SYSTEM READY. PLEASE BOOT.</div>
    <button id="btnInit" class="btn">BOOT CORE ENGINE</button>
    <button id="btnToggle" class="btn" disabled>START SCAN</button>
    <button id="btnClear" class="btn">RESET WORLD</button>
    <div id="errMsg" class="error" style="display:none"></div>
</div>

<div id="pip"><video id="v" autoplay playsinline muted></video></div>

<script>
    let scene, camera, renderer, estimator, stream;
    let isScanning = false;
    let voxelMap = new Map();
    let instancedMesh;
    const MAX_VOXELS = 50000;
    const VOXEL_SIZE = 0.25;

    const logDiv = document.getElementById('log');
    const errDiv = document.getElementById('errMsg');

    function status(msg) {
        logDiv.innerHTML += `> ${msg}<br>`;
        logDiv.scrollTop = logDiv.scrollHeight;
    }

    async function init() {
        document.getElementById('btnInit').disabled = true;
        document.getElementById('btnInit').innerText = "BOOTING...";
        errDiv.style.display = "none";

        try {
            status("Loading TFJS...");
            await tf.ready();
            status("Backend: " + tf.getBackend());

            status("Fetching Depth Model...");
            // Explicitly wait for the estimator to build
            estimator = await depthEstimation.createEstimator(
                depthEstimation.SupportedModels.ARPortraitDepth
            );
            status("Model Online.");

            status("Starting Video...");
            stream = await navigator.mediaDevices.getUserMedia({ 
                video: { width: 256, height: 256, facingMode: "environment" } 
            });
            document.getElementById('v').srcObject = stream;

            setup3D();
            
            document.getElementById('btnToggle').disabled = false;
            document.getElementById('btnInit').style.display = "none";
            status("System Fully Active.");
            
            runLoop();
        } catch (e) {
            errDiv.innerText = "CRITICAL: " + e.message;
            errDiv.style.display = "block";
            document.getElementById('btnInit').disabled = false;
            document.getElementById('btnInit').innerText = "RETRY BOOT";
        }
    }

    function setup3D() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        camera.position.set(5, 5, 10);

        renderer = new THREE.WebGLRenderer({ antialias: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        new THREE.OrbitControls(camera, renderer.domElement);
        
        const geometry = new THREE.BoxGeometry(VOXEL_SIZE, VOXEL_SIZE, VOXEL_SIZE);
        const material = new THREE.MeshPhongMaterial({ color: 0x00ff00 });
        instancedMesh = new THREE.InstancedMesh(geometry, material, MAX_VOXELS);
        scene.add(instancedMesh);
        
        scene.add(new THREE.AmbientLight(0x404040));
        const light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(1, 1, 1);
        scene.add(light);
    }

    async function runLoop() {
        const video = document.getElementById('v');
        if (isScanning && video.readyState === 4) {
            try {
                const depthMap = await estimator.estimateDepth(video);
                const depthValues = await depthMap.toArray();
                
                const dummy = new THREE.Object3D();
                const skip = 6;

                for (let y = 0; y < depthValues.length; y += skip) {
                    for (let x = 0; x < depthValues[0].length; x += skip) {
                        const depth = depthValues[y][x];
                        if (depth < 0.2) continue; 

                        const worldPos = new THREE.Vector3((x/depthValues[0].length-0.5)*15, (0.5-y/depthValues.length)*15, depth*-12);
                        worldPos.applyQuaternion(camera.quaternion);
                        worldPos.add(camera.position);

                        const gx = Math.round(worldPos.x/VOXEL_SIZE)*VOXEL_SIZE;
                        const gy = Math.round(worldPos.y/VOXEL_SIZE)*VOXEL_SIZE;
                        const gz = Math.round(worldPos.z/VOXEL_SIZE)*VOXEL_SIZE;
                        const key = `${gx},${gy},${gz}`;

                        if (!voxelMap.has(key) && voxelMap.size < MAX_VOXELS) {
                            voxelMap.set(key, true);
                            dummy.position.set(gx, gy, gz);
                            dummy.updateMatrix();
                            instancedMesh.setMatrixAt(voxelMap.size - 1, dummy.matrix);
                        }
                    }
                }
                instancedMesh.instanceMatrix.needsUpdate = true;
                depthMap.dispose(); 
            } catch (err) { }
        }
        renderer.render(scene, camera);
        requestAnimationFrame(runLoop);
    }

    document.getElementById('btnToggle').onclick = function() {
        isScanning = !isScanning;
        this.innerText = isScanning ? "PAUSE SCAN" : "RESUME SCAN";
        this.style.background = isScanning ? "#f00" : "#0f0";
    };

    document.getElementById('btnClear').onclick = () => {
        voxelMap.clear();
        instancedMesh.instanceMatrix.needsUpdate = true;
    };

    document.getElementById('btnInit').onclick = init;
</script>
</body>
</html>
