<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sentry Cloud Mapper v3.1</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.15.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/depth-estimation@0.0.4"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <style>
        body { margin: 0; background: #000; color: #0f0; font-family: 'Courier New', monospace; overflow: hidden; }
        #ui-layer { 
            position: absolute; top: 10px; left: 10px; z-index: 100; 
            background: rgba(0,0,0,0.9); padding: 15px; border: 1px solid #0f0; 
            width: 260px; pointer-events: auto;
        }
        .btn-group { display: flex; flex-direction: column; gap: 8px; margin-top: 10px; }
        button { 
            padding: 12px; background: #0f0; color: #000; border: none; 
            font-weight: bold; cursor: pointer; text-transform: uppercase;
        }
        button:disabled { background: #030; color: #060; cursor: not-allowed; }
        #gps-data { font-size: 11px; margin-top: 5px; color: #888; }
        #err-log { color: #f00; font-size: 10px; margin-top: 10px; word-wrap: break-word; }
    </style>
</head>
<body>

<div id="ui-layer">
    <div style="font-size: 14px; font-weight: bold;">SENTRY DEPTH ENGINE</div>
    <div style="font-size: 12px; margin-top: 5px;">STATUS: <span id="sys-state">INITIALIZING...</span></div>
    <div id="gps-data">GPS: PENDING...</div>
    
    <div class="btn-group">
        <button id="initBtn">BOOT HARDWARE</button>
        <button id="toggleBtn" disabled>START SCAN</button>
        <button id="saveBtn" disabled>EXPORT .XYZ</button>
    </div>
    <div id="err-log"></div>
</div>

<video id="v" autoplay playsinline muted style="display:none"></video>

<script>
    let scene, camera, renderer, points, estimator, controls;
    let isScanning = false;
    let lastCloudData = null;
    let currentGPS = "0.0, 0.0";
    const RES = 128; // Optimized resolution for mobile TF.js performance

    const v = document.getElementById('v');
    const initBtn = document.getElementById('initBtn');
    const toggleBtn = document.getElementById('toggleBtn');
    const saveBtn = document.getElementById('saveBtn');
    const errLog = document.getElementById('err-log');

    async function init() {
        initBtn.innerText = "LOADING TF.JS...";
        try {
            // 1. Initialize TF.js Backend
            await tf.setBackend('webgl');
            await tf.ready();
            
            // 2. Load Depth Model (Now with MediaPipe dependency present)
            estimator = await depthEstimation.createEstimator(
                depthEstimation.SupportedModels.ARPortraitDepth
            );
            
            // 3. Request Camera
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { width: RES, height: RES, facingMode: "environment" } 
            });
            v.srcObject = stream;
            await v.play();

            setupThree();
            startGPS();

            document.getElementById('sys-state').innerText = "ONLINE";
            initBtn.disabled = true;
            toggleBtn.disabled = false;
            initBtn.innerText = "HARDWARE READY";
        } catch (e) {
            errLog.innerText = "CRITICAL ERROR: " + e.message;
            console.error(e);
        }
    }

    function setupThree() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 15);

        renderer = new THREE.WebGLRenderer({ antialias: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        const geo = new THREE.BufferGeometry();
        const pos = new Float32Array(RES * RES * 3);
        geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
        
        // Use a bright green point material for high visibility
        const mat = new THREE.PointsMaterial({ size: 0.1, color: 0x00ff00 });
        points = new THREE.Points(geo, mat);
        scene.add(points);

        animate();
    }

    function startGPS() {
        if (navigator.geolocation) {
            navigator.geolocation.watchPosition(p => {
                currentGPS = `${p.coords.latitude.toFixed(6)}, ${p.coords.longitude.toFixed(6)}`;
                document.getElementById('gps-data').innerText = `GPS: ${currentGPS}`;
            }, null, {enableHighAccuracy: true});
        }
    }

    async function updateCloud() {
        if (!isScanning || v.readyState !== 4) return;

        try {
            const depth = await estimator.estimateDepth(v);
            lastCloudData = await depth.toArray();
            const attr = points.geometry.attributes.position.array;
            
            let i = 0;
            const scale = 0.15; // Spatial scaling
            for(let y=0; y<RES; y++) {
                for(let x=0; x<RES; x++) {
                    const z = lastCloudData[y][x];
                    attr[i++] = (x - RES/2) * scale; 
                    attr[i++] = (RES/2 - y) * scale; 
                    attr[i++] = z * -20; // Depth exaggeration for visualization
                }
            }
            points.geometry.attributes.position.needsUpdate = true;
            saveBtn.disabled = false;
        } catch (e) {
            console.warn("Frame dropped: ", e.message);
        }
    }

    function animate() {
        updateCloud();
        if(controls) controls.update();
        renderer.render(scene, camera);
        requestAnimationFrame(animate);
    }

    toggleBtn.onclick = () => {
        isScanning = !isScanning;
        toggleBtn.innerText = isScanning ? "PAUSE SCAN" : "RESUME SCAN";
        document.getElementById('sys-state').innerText = isScanning ? "SCANNING" : "PAUSED";
        toggleBtn.style.background = isScanning ? "#f00" : "#0f0";
    };

    saveBtn.onclick = () => {
        if (!lastCloudData) return;
        let output = `# SENTRY CLOUD EXPORT\n# GPS: ${currentGPS}\n# X Y Z\n`;
        const scale = 0.15;
        for(let y=0; y<RES; y++) {
            for(let x=0; x<RES; x++) {
                const z = (lastCloudData[y][x] * -20).toFixed(4);
                const posX = ((x - RES/2) * scale).toFixed(4);
                const posY = ((RES/2 - y) * scale).toFixed(4);
                output += `${posX} ${posY} ${z}\n`;
            }
        }
        const blob = new Blob([output], {type: 'text/plain'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `sentry_scan_${Date.now()}.xyz`;
        a.click();
    };

    initBtn.onclick = init;
    
    // Resize handler for orientation changes
    window.addEventListener('resize', () => {
        if (camera && renderer) {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
    });
</script>
</body>
</html>
