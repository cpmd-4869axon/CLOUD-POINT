<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sentry Depth Mapper v3.3</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.15.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/depth-estimation@0.0.4"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <style>
        body { margin: 0; background: #000; color: #0f0; font-family: 'Courier New', monospace; overflow: hidden; }
        #ui { position: absolute; top: 10px; left: 10px; z-index: 100; background: rgba(0,0,0,0.9); padding: 15px; border: 1px solid #0f0; width: 260px; }
        .btn-group { display: flex; flex-direction: column; gap: 8px; margin-top: 10px; }
        button { padding: 12px; background: #0f0; color: #000; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        button:disabled { background: #030; color: #060; cursor: not-allowed; }
        #log { color: #f00; font-size: 10px; margin-top: 10px; word-wrap: break-word; }
    </style>
</head>
<body>

<div id="ui">
    <div style="font-weight: bold;">SENTRY DEPTH ENGINE</div>
    <div id="status" style="font-size: 12px; margin-top: 5px;">STATUS: OFFLINE</div>
    <div id="gps" style="font-size: 11px; color: #888;">GPS: PENDING...</div>
    
    <div class="btn-group">
        <button id="btnInit">1. BOOT ENGINE</button>
        <button id="btnToggle" disabled>2. START SCAN</button>
        <button id="btnSave" disabled>3. EXPORT .XYZ</button>
    </div>
    <div id="log"></div>
</div>

<video id="v" autoplay playsinline muted style="display:none"></video>

<script>
    let scene, camera, renderer, points, estimator, controls;
    let isScanning = false;
    let lastDepthData = null;
    let coords = "0.0, 0.0";
    const RES = 128; // Mobile-safe resolution

    const v = document.getElementById('v');
    const log = document.getElementById('log');

    async function init() {
        document.getElementById('btnInit').innerText = "LOADING ENGINE...";
        log.innerText = "";
        
        try {
            // Check for MediaPipe Global
            if (typeof SelfieSegmentation === 'undefined') {
                throw new Error("MediaPipe not loaded. Check internet connection.");
            }

            await tf.setBackend('webgl');
            await tf.ready();
            
            // Initialize Estimator with explicit runtime configuration
            const model = depthEstimation.SupportedModels.ARPortraitDepth;
            estimator = await depthEstimation.createEstimator(model, {
                runtime: 'mediapipe',
                solutionPath: 'https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation'
            });
            
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { width: RES, height: RES, facingMode: "environment" } 
            });
            v.srcObject = stream;
            await v.play();

            setup3D();
            startGPS();

            document.getElementById('status').innerText = "STATUS: ONLINE";
            document.getElementById('btnInit').disabled = true;
            document.getElementById('btnToggle').disabled = false;
            document.getElementById('btnInit').innerText = "ENGINE READY";
        } catch (e) {
            log.innerText = "CRITICAL: " + e.message;
            console.error(e);
        }
    }

    function setup3D() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 15);

        renderer = new THREE.WebGLRenderer({ antialias: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        const geo = new THREE.BufferGeometry();
        const pos = new Float32Array(RES * RES * 3);
        geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
        points = new THREE.Points(geo, new THREE.PointsMaterial({ size: 0.1, color: 0x00ff00 }));
        scene.add(points);

        loop();
    }

    function startGPS() {
        if (navigator.geolocation) {
            navigator.geolocation.watchPosition(p => {
                coords = `${p.coords.latitude.toFixed(6)}, ${p.coords.longitude.toFixed(6)}`;
                document.getElementById('gps').innerText = `GPS: ${coords}`;
            }, null, {enableHighAccuracy: true});
        }
    }

    async function update() {
        if (!isScanning || v.readyState !== 4) return;
        try {
            const depth = await estimator.estimateDepth(v);
            lastDepthData = await depth.toArray();
            const attr = points.geometry.attributes.position.array;
            let i = 0;
            const scale = 0.12; 
            for(let y=0; y<RES; y++) {
                for(let x=0; x<RES; x++) {
                    attr[i++] = (x - RES/2) * scale; 
                    attr[i++] = (RES/2 - y) * scale; 
                    attr[i++] = lastDepthData[y][x] * -15; 
                }
            }
            points.geometry.attributes.position.needsUpdate = true;
            document.getElementById('btnSave').disabled = false;
        } catch (e) { console.warn(e); }
    }

    function loop() {
        update();
        if(controls) controls.update();
        renderer.render(scene, camera);
        requestAnimationFrame(loop);
    }

    document.getElementById('btnToggle').onclick = () => {
        isScanning = !isScanning;
        document.getElementById('btnToggle').innerText = isScanning ? "PAUSE SCAN" : "RESUME SCAN";
        document.getElementById('btnToggle').style.background = isScanning ? "#f00" : "#0f0";
    };

    document.getElementById('btnSave').onclick = () => {
        if (!lastDepthData) return;
        let out = `# SENTRY SCAN | GPS: ${coords}\n`;
        for(let y=0; y<RES; y++) {
            for(let x=0; x<RES; x++) {
                out += `${((x-RES/2)*0.12).toFixed(3)} ${((RES/2-y)*0.12).toFixed(3)} ${(lastDepthData[y][x]*-15).toFixed(3)}\n`;
            }
        }
        const a = document.createElement('a');
        a.href = URL.createObjectURL(new Blob([out], {type: 'text/plain'}));
        a.download = `scan_${Date.now()}.xyz`;
        a.click();
    };

    document.getElementById('btnInit').onclick = init;
</script>
</body>
</html>
